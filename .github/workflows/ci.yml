name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts skips the crawler's Chromium postinstall; nothing in
      # build/typecheck/test needs a browser.
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
